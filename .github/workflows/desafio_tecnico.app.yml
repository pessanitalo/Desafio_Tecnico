name: Deploy Angular to S3
on:
  push:
    branches:
      - main # executa os testes na branch main
jobs:
  run-tests:
    runs-on: ubuntu-latest
    outputs:
      versao: ${{ steps.docker_build.outputs.tag}}

    steps:
     - name: Checkout
       uses: actions/checkout@v4

     - name: get npm cache directory
       id: npm-cache-dir
       shell: bash
       run: echo "dir=$(npm config get cache)" >> ${GITHUB_OUTPUT}

     - uses: actions/cache@v4
       id: npm-cache
       with:
        path: ${{ steps.npm-cache-dir.outputs.dir}}
        key: npm-cache-dir-${{ hashFiles('**/package-lock.json')}}

     - name: Setup Node.js
       uses: actions/setup-node@v4
       with:
        node-version: '24'

     - name: Install dependencias
       run: npm ci
       working-directory: Desafio_Tecnico.App  ## busca o nome onde esta as dependencias

     - name: Build app
       run: npm run build
       working-directory: Desafio_Tecnico.App
     
     - name: Deploy to S3
       env:
         AWS_ACCESS_KEY_ID: ${{ secrets.AWS_SECRET_ACCESS_KEY_UPDATE_S3 }}
         AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_ACCESS_KEY_ID_UPDATE_S3 }}
         AWS_DEFAULT_REGION: us-east-1
       run: |
        aws s3 ls