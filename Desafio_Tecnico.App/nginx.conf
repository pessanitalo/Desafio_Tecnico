worker_processes 4;

events { 
    worker_connections 1024; 
}

http {

    sendfile on;
    include /etc/nginx/mime.types;

    server {
        listen 80;
        root /usr/share/nginx/html;
        index index.html;

        # Handle Angular routes - serve index.html for all routes
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Prevent directory redirects
        location ~ ^/(pacientes-lista|consultas-lista|profissionais-lista|paciente-novo|consulta-novo|profissional-novo)/ {
            try_files $uri /index.html;
        }

        # Disable logging for favicon and robots
        location = /favicon.ico { access_log off; log_not_found off; }
        location = /robots.txt { access_log off; log_not_found off; }

        # Gzip compression
        gzip on;
        gzip_vary on;
        gzip_min_length 1024;
        gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/json application/javascript;
    }
}