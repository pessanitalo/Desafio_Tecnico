<div class="container">
    <div class="row justify-content-center mt-5 py-4">
        <div class="col-md-5 margin-top">
            <form (ngSubmit)="entrar()" novalidate [formGroup]="Form">
                <div class="text-center mb-4">
                    <h2 class="mb-2">Login</h2>
                    <p class="text-muted mb-0">Informe seu e-mail e senha para acessar.</p>
                </div>

                <div class="form-group mb-4">
                    <label class="control-label mb-2 d-block" for="email">E-mail</label>
                    <input class="form-control" id="email" type="email" formControlName="email"
                        placeholder="Digite seu e-mail" />
                </div>

                <div class="form-group mb-5">
                    <label class="control-label mb-2 d-block" for="senha">Senha</label>
                    <input class="form-control" id="senha" type="password" formControlName="senha"
                        placeholder="Digite sua senha" />
                </div>

                <div class="form-group d-flex gap-3 pt-3">
                    <button type="submit" class="btn btn-primary flex-grow-1" [disabled]="!Form.valid">Entrar</button>
                    <button type="button" class="btn btn-outline-secondary flex-grow-1"
                        [routerLink]="['/user-novo']">Cadastrar</button>
                </div>
            </form>
        </div>
    </div>
</div>
