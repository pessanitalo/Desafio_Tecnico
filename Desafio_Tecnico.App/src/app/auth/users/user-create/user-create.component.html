<div class="container">
    <div class="row justify-content-center mt-5 py-4">
        <div class="col-md-6 margin-top">
            <form (ngSubmit)="adicionar()" novalidate [formGroup]="Form">
                <div class="form-group mb-4">
                    <label class="control-label mb-2 d-block" for="email">E-mail</label>
                    <input
                        class="form-control"
                        id="email"
                        type="email"
                        formControlName="email"
                        placeholder="Digite o e-mail do usuário" />
                </div>

                <div class="form-group mb-5">
                    <label class="control-label mb-2 d-block" for="senha">Senha</label>
                    <input
                        class="form-control"
                        id="senha"
                        type="password"
                        formControlName="senha"
                        placeholder="Digite a senha do usuário" />
                </div>

                <div class="form-group d-flex gap-3 pt-3">
                    <button type="submit" class="btn btn-primary flex-grow-1" [disabled]="!Form.valid">Salvar</button>
                </div>
            </form>
        </div>
    </div>
</div>
